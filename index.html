<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNI | Laser North Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-container" class="card">
            <div class="header" style="border:none; margin-bottom: 0;">
                <h1>LNI TERMINAL</h1>
                <p>Laser North Inventory Control</p>
            </div>
            <button id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign in with Google
            </button>
            <div style="margin-top: 40px; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 2px;">
                AUTHORIZED PERSONNEL ONLY
            </div>
        </div>

        <div id="inventory-ui" class="card" style="display:none;">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h2 id="user-greeting" style="font-size: 0.85rem; margin-bottom: 4px;">Welcome</h2>
                    <span class="status-badge">System Active</span>
                </div>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
            
            <div class="dashboard-layout">
                <form id="material-form">
                    <div class="input-group" style="margin-bottom: 25px;">
                        <label>Inventory Mode</label>
                        <div style="display: flex; gap: 2px;">
                            <button type="button" id="mode-sheet" class="btn-mode active">Sheet</button>
                            <button type="button" id="mode-tube" class="btn-mode">Structural</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label id="label-grade">Material Grade</label>
                        <select id="mat-name" required></select>
                    </div>

                    <div class="input-group" id="group-type" style="display:none;">
                        <label id="label-sub-type">Material Type</label>
                        <select id="struct-type"></select>
                    </div>

                    <div class="input-group">
                        <label id="label-dim">Thickness</label>
                        <input type="text" id="dim-input" placeholder="e.g. 0.250" required>
                    </div>

                    <div class="input-group">
                        <label id="label-len">Size (W x L)</label>
                        <input type="text" id="len-input" placeholder="e.g. 48 x 96" required>
                    </div>

                    <div class="input-group">
                        <label>Cert / Heat Number</label>
                        <input type="text" id="cert-num" placeholder="C-XXXXX" required>
                    </div>

                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="Rack B-2" required>
                    </div>

                    <div class="input-group">
                        <label>Notes (Optional)</label>
                        <input type="text" id="other-info" placeholder="Additional details...">
                    </div>

                    <button type="submit" id="submit-btn" class="btn-submit">Add Entry</button>
                </form>

                <div id="stock-view">
                    <h3 id="stock-view-title" style="font-size: 0.85rem; margin-bottom: 15px; color: var(--brand-black); text-transform: uppercase; letter-spacing: 1px;">Live Stock View</h3>
                    
                    <div class="search-row">
                        <input type="text" id="search-1" placeholder="Filt. Dim">
                        <input type="text" id="search-2" placeholder="Filt. Size/Len">
                        <input type="text" id="search-3" placeholder="Filt. Material">
                    </div>
                    
                    <div id="inventory-list" class="inventory-grid">
                        <p class="footer-note">Select a category above to pull live data.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
