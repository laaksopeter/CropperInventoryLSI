<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNI | Laser North Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-container" class="card">
            <div class="header" style="border:none; margin-bottom: 0;">
                <h1>LNI TERMINAL</h1>
                <p>Laser North Inventory Control</p>
            </div>
            
            <button id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Sign in with Google
            </button>
            
            <div style="margin-top: 40px; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 2px;">
                AUTHORIZED PERSONNEL ONLY
            </div>
        </div>

        <div id="inventory-ui" class="card" style="display:none;">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h2 id="user-greeting" style="font-size: 0.85rem; margin-bottom: 4px;">Welcome</h2>
                    <span class="status-badge">System Active</span>
                </div>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
            
            <div class="dashboard-layout">
                <form id="material-form">
                    <div class="input-group">
                        <label>Material Grade</label>
                        <select id="mat-name" required>
                            <option value="" disabled selected>Select Grade...</option>
                            <option value="A1008">A1008 (CR)</option>
                            <option value="A1011">A1011 (HR)</option>
                            <option value="A36">A36 (Steel)</option>
                            <option value="5052">5052 (Alum)</option>
                            <option value="5052 Filmed">5052 Filmed(Alum)</option>
                            <option value="6061">6061 (Alum)</option>
                            <option value="304 #4">304 #4(SS)</option>
                            <option value="304 #4 Filmed">304 #4 Filmed(SS)</option>
                            <option value="304 2B">304 2B(SS)</option>
                            <option value="304 2B Filmed">304 2B Filmed(SS)</option>
                            <option value="316 #4">316 #4(SS)</option>
                            <option value="316 #4 Filmed">316 #4 Filmed(SS)</option>
                            <option value="316 2B">316 2B(SS)</option>
                            <option value="316 2B Filmed">316 2B Filmed(SS)</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Size (W x L)</label>
                        <input type="text" id="sheet-size" placeholder="48 x 96" required>
                    </div>

                    <div class="input-group">
                        <label>Thickness</label>
                        <input type="text" id="thickness" placeholder="0.250" required>
                    </div>

                    <div class="input-group">
                        <label>Cert Number</label>
                        <input type="text" id="cert-num" placeholder="C-XXXXX" required>
                    </div>

                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="Rack B-2" required>
                    </div>

                    <div class="input-group">
                        <label>Notes (Optional)</label>
                        <input type="text" id="other-info" placeholder="Additional details...">
                    </div>

                    <button type="submit" id="submit-btn" class="btn-submit">Add Entry</button>
                </form>

                <div id="stock-view">
                    <h3 style="font-size: 0.85rem; margin-bottom: 15px; color: var(--brand-black); text-transform: uppercase; letter-spacing: 1px;">Live Stock View</h3>
                    
                    <div class="search-row" style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" id="search-thickness" placeholder="Filter Thickness" style="width: 50%;">
                        <input type="text" id="search-size" placeholder="Filter Size" style="width: 50%;">
                    </div>
                    
                    <div id="inventory-list" class="inventory-grid">
                        <p class="footer-note">Select a grade above to pull live data.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
