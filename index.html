<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNI | Laser North Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-container" class="card login-card">
            <div class="login-header">
                <div class="logo-accent"></div>
                <h1>LNI TERMINAL</h1>
                <p>LASER NORTH INVENTORY SYSTEM</p>
            </div>
            <div class="login-body">
                <button id="login-btn" class="google-signin">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>Operator Sign-In</span>
                </button>
            </div>
            <div class="login-footer">
                <span class="warning-text">RESTRICTED ACCESS</span>
                <p>AUTHORIZED PERSONNEL ONLY</p>
            </div>
        </div>

        <div id="inventory-ui" class="card" style="display:none;">
            <div class="header">
                <div>
                    <h2 id="user-greeting">Welcome</h2>
                    <span id="health-badge" class="status-badge">Checking System...</span>
                </div>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
            
            <div class="dashboard-layout">
                <div class="entry-pane">
                    <form id="material-form">
                        <div class="input-group">
                            <label>Inventory Mode</label>
                            <div class="mode-toggle">
                                <button type="button" id="mode-sheet" class="btn-mode active">Sheet</button>
                                <button type="button" id="mode-tube" class="btn-mode">Structural</button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label id="label-grade">Material Type</label>
                            <select id="mat-name" required></select>
                        </div>

                        <div id="group-type" class="input-group" style="display:none;">
                            <label id="label-sub-type">Material Type</label>
                            <select id="struct-type"></select>
                        </div>

                        <div class="input-group">
                            <label id="label-dim">Thickness</label>
                            <input type="text" id="dim-input" placeholder="e.g. 0.250 or 16GA" required>
                        </div>

                        <div class="input-group">
                            <label id="label-len">Size (W x L)</label>
                            <input type="text" id="len-input" placeholder="e.g. 48 x 96" required>
                        </div>

                        <div class="input-group">
                            <label>Cert #</label>
                            <input type="text" id="cert-num" placeholder="C-XXXXX" required>
                        </div>

                        <div class="input-group">
                            <label>Location</label>
                            <input type="text" id="location" placeholder="Rack B-2" required>
                        </div>

                        <div class="input-group">
                            <label>Notes</label>
                            <input type="text" id="other-info" placeholder="Optional notes...">
                        </div>

                        <button type="submit" id="submit-btn" class="btn-submit">Add Entry</button>
                    </form>
                </div>

                <div id="stock-view">
                    <h3 class="pane-title">Active Stock View</h3>
                    <div class="search-row">
                        <input type="text" id="search-1" placeholder="Filt Thickness">
                        <input type="text" id="search-2" placeholder="Filt. Size/Len">
                        <input type="text" id="search-4" placeholder="Filt. Cert #">
                    </div>
                    <div id="inventory-list" class="inventory-grid">
                        <p class="footer-note">Select a Category to View Inventory</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
